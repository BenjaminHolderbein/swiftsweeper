<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a32"/>
      <stop offset="1" stop-color="#1d1d24"/>
    </linearGradient>
  </defs>

  <!-- Dark mode (current) -->
  <rect x="0" y="0" width="720" height="190" fill="url(#panel)"/>
  <text x="20" y="28" font-family="-apple-system" font-size="13" fill="#cfcfd5" font-weight="600">Our dark-mode palette (classic hues, lifted lightness)</text>
  <g font-family="-apple-system, SF Pro Display, Helvetica" font-weight="700" font-size="48" text-anchor="middle" dominant-baseline="central">
    <rect x="20"  y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="60"  y="102" fill="rgb(102,163,255)">1</text>
    <rect x="110" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="150" y="102" fill="rgb(77,209,89)">2</text>
    <rect x="200" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="240" y="102" fill="rgb(255,77,77)">3</text>
    <rect x="290" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="330" y="102" fill="rgb(51,102,217)">4</text>
    <rect x="380" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="420" y="102" fill="rgb(170,70,70)">5</text>
    <rect x="470" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="510" y="102" fill="rgb(77,209,209)">6</text>
    <rect x="560" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="600" y="102" fill="rgb(255,255,255)">7</text>
    <rect x="650" y="60" width="80" height="80" rx="10" fill="#000" fill-opacity="0.45"/>
    <text x="690" y="102" fill="rgb(140,140,140)">8</text>
  </g>

  <!-- Classic Windows -->
  <rect x="0" y="190" width="720" height="190" fill="#c0c0c0"/>
  <text x="20" y="218" font-family="Tahoma, -apple-system" font-size="13" fill="#202020" font-weight="700">Classic Windows Minesweeper</text>
  <g font-family="Tahoma, MS Sans Serif, -apple-system" font-weight="700" font-size="48" text-anchor="middle" dominant-baseline="central">
    <g>
      <rect x="20"  y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="20,250 100,250 96,254 24,254 24,326 20,330" fill="#ffffff"/>
      <polygon points="100,250 100,330 20,330 24,326 96,326 96,254" fill="#7b7b7b"/>
      <text x="60"  y="292" fill="#0000ff">1</text>

      <rect x="110" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="110,250 190,250 186,254 114,254 114,326 110,330" fill="#ffffff"/>
      <polygon points="190,250 190,330 110,330 114,326 186,326 186,254" fill="#7b7b7b"/>
      <text x="150" y="292" fill="#008000">2</text>

      <rect x="200" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="200,250 280,250 276,254 204,254 204,326 200,330" fill="#ffffff"/>
      <polygon points="280,250 280,330 200,330 204,326 276,326 276,254" fill="#7b7b7b"/>
      <text x="240" y="292" fill="#ff0000">3</text>

      <rect x="290" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="290,250 370,250 366,254 294,254 294,326 290,330" fill="#ffffff"/>
      <polygon points="370,250 370,330 290,330 294,326 366,326 366,254" fill="#7b7b7b"/>
      <text x="330" y="292" fill="#000080">4</text>

      <rect x="380" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="380,250 460,250 456,254 384,254 384,326 380,330" fill="#ffffff"/>
      <polygon points="460,250 460,330 380,330 384,326 456,326 456,254" fill="#7b7b7b"/>
      <text x="420" y="292" fill="#800000">5</text>

      <rect x="470" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="470,250 550,250 546,254 474,254 474,326 470,330" fill="#ffffff"/>
      <polygon points="550,250 550,330 470,330 474,326 546,326 546,254" fill="#7b7b7b"/>
      <text x="510" y="292" fill="#008080">6</text>

      <rect x="560" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="560,250 640,250 636,254 564,254 564,326 560,330" fill="#ffffff"/>
      <polygon points="640,250 640,330 560,330 564,326 636,326 636,254" fill="#7b7b7b"/>
      <text x="600" y="292" fill="#000000">7</text>

      <rect x="650" y="250" width="80" height="80" fill="#bdbdbd"/>
      <polygon points="650,250 730,250 726,254 654,254 654,326 650,330" fill="#ffffff"/>
      <polygon points="730,250 730,330 650,330 654,326 726,326 726,254" fill="#7b7b7b"/>
      <text x="690" y="292" fill="#808080">8</text>
    </g>
  </g>
</svg>
